name: Sync upstream main

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout control branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: sync-control

      - name: Configure upstream
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote remove upstream
          fi
          git remote add upstream https://github.com/openai/codex.git

      - name: Fetch upstream main
        run: |
          git fetch upstream main

      - name: Update local main to match upstream
        run: |
          git branch -f main upstream/main

      - name: Push mirrored main to GitHub fork
        run: |
          git push origin +main:main

      - name: Push mirrored main to CNB
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          git push https://cnb:${CNB_TOKEN}@cnb.cool/jiangshengdev/codex.git +main:main
